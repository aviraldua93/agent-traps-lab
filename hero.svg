<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1033"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="dangerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-shield">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <style>
      @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
      @keyframes pulse-slow { 0%,100% { opacity: 0.2; } 50% { opacity: 0.6; } }
      @keyframes dash-flow { 0% { stroke-dashoffset: 24; } 100% { stroke-dashoffset: 0; } }
      @keyframes dash-flow-r { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 24; } }
      @keyframes float-y { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
      @keyframes float-y2 { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(6px); } }
      @keyframes scale-pulse { 0%,100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 1; } }
      @keyframes ripple { 0% { r: 8; opacity: 0.6; } 100% { r: 28; opacity: 0; } }
      @keyframes ripple-lg { 0% { r: 30; opacity: 0.3; } 100% { r: 55; opacity: 0; } }
      @keyframes scan { 0% { transform: translateY(-200px); opacity: 0; } 10% { opacity: 0.12; } 90% { opacity: 0.12; } 100% { transform: translateY(200px); opacity: 0; } }
      @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes particle-up { 0% { transform: translateY(0) scale(1); opacity: 0.8; } 100% { transform: translateY(-60px) scale(0); opacity: 0; } }
      @keyframes glow-breathe { 0%,100% { filter: drop-shadow(0 0 4px #8b5cf6); } 50% { filter: drop-shadow(0 0 16px #8b5cf6); } }
      @keyframes glow-red { 0%,100% { filter: drop-shadow(0 0 3px #ef4444); } 50% { filter: drop-shadow(0 0 10px #ef4444); } }
      @keyframes attack-probe { 0% { stroke-dashoffset: 40; opacity: 0.8; } 100% { stroke-dashoffset: 0; opacity: 0.3; } }
      @keyframes orbit { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .scan-line { animation: scan 5s ease-in-out infinite; }
      .node-pulse { animation: pulse 2s ease-in-out infinite; }
      .node-pulse-d1 { animation: pulse 2s ease-in-out 0.4s infinite; }
      .node-pulse-d2 { animation: pulse 2s ease-in-out 0.8s infinite; }
      .node-pulse-d3 { animation: pulse 2s ease-in-out 1.2s infinite; }
      .node-pulse-d4 { animation: pulse 2s ease-in-out 1.6s infinite; }
      .flow-line { animation: dash-flow 1.2s linear infinite; }
      .flow-line-r { animation: dash-flow-r 1.2s linear infinite; }
      .flow-line-d1 { animation: dash-flow 1.2s linear 0.3s infinite; }
      .flow-line-d2 { animation: dash-flow 1.2s linear 0.6s infinite; }
      .attack-line { animation: attack-probe 1.5s linear infinite; }
      .attack-line-d1 { animation: attack-probe 1.5s linear 0.3s infinite; }
      .attack-line-d2 { animation: attack-probe 1.5s linear 0.6s infinite; }
      .attack-line-d3 { animation: attack-probe 1.5s linear 0.9s infinite; }
      .attack-line-d4 { animation: attack-probe 1.5s linear 1.2s infinite; }
      .float { animation: float-y 3s ease-in-out infinite; }
      .float-d1 { animation: float-y 3s ease-in-out 0.5s infinite; }
      .float-d2 { animation: float-y2 3s ease-in-out 1s infinite; }
      .float-d3 { animation: float-y 4s ease-in-out 1.5s infinite; }
      .ripple1 { animation: ripple 2.5s ease-out infinite; }
      .ripple2 { animation: ripple 2.5s ease-out 0.8s infinite; }
      .ripple-shield { animation: ripple-lg 3s ease-out infinite; }
      .ripple-shield2 { animation: ripple-lg 3s ease-out 1s infinite; }
      .ripple-shield3 { animation: ripple-lg 3s ease-out 2s infinite; }
      .particle { animation: particle-up 2s ease-out infinite; }
      .particle-d1 { animation: particle-up 2s ease-out 0.4s infinite; }
      .particle-d2 { animation: particle-up 2s ease-out 0.8s infinite; }
      .particle-d3 { animation: particle-up 2s ease-out 1.2s infinite; }
      .glow-b { animation: glow-breathe 3s ease-in-out infinite; }
      .glow-r { animation: glow-red 2s ease-in-out infinite; }
      .blink-cursor { animation: blink 1s step-end infinite; }
      .pulse-slow { animation: pulse-slow 4s ease-in-out infinite; }
      .scale-p { animation: scale-pulse 2.5s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>

  <!-- Scanning line (red-tinted) -->
  <rect class="scan-line" x="0" y="195" width="800" height="10" fill="url(#dangerGrad)" opacity="0.08" rx="2"/>

