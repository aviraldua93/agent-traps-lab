    <text x="88" y="166" font-family="monospace" font-size="7" fill="#22c55e">: complete</text>
    <rect x="48" y="170" width="50" height="3" rx="1" fill="#1e293b"/>
    <rect x="48" y="170" width="50" height="3" rx="1" fill="#22c55e" opacity="0.7"/>
  </g>

