  <path d="M 20 350 L 20 370 L 50 370" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <path d="M 750 370 L 780 370 L 780 350" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="32" font-weight="900" letter-spacing="4" fill="url(#titleGrad)">AGENT TRAPS LAB</text>
  <text x="400" y="74" text-anchor="middle" font-family="'Cascadia Code','Fira Code',monospace" font-size="11" fill="#94a3b8" letter-spacing="1">Empirical Testbed for AI Agent Security</text>

  <!-- Central Shield -->
