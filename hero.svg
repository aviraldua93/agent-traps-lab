    <circle cx="400" cy="210" r="32" fill="#0f172a" stroke="url(#shieldGrad)" stroke-width="2.5"/>
    <path d="M400 188 L418 198 L418 218 L400 232 L382 218 L382 198 Z" fill="none" stroke="#8b5cf6" stroke-width="1.8" opacity="0.9"/>
    <path d="M400 195 L412 202 L412 216 L400 225 L388 216 L388 202 Z" fill="#8b5cf620" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
