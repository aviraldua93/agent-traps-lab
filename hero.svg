    <text x="660" y="214" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#ef4444">⚠</text>
    <text x="660" y="240" text-anchor="middle" font-family="monospace" font-size="6" fill="#ef4444" opacity="0.7">TOOL MISUSE</text>
  </g>
