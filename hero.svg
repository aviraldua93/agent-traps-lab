    <circle cx="72" cy="108" r="3" fill="#22c55e" opacity="0.8"/>
    <text x="105" y="111" text-anchor="middle" font-family="monospace" font-size="7" fill="#475569">experiment</text>
    <text x="48" y="130" font-family="monospace" font-size="7" fill="#f59e0b">scenarios</text>
    <text x="100" y="130" font-family="monospace" font-size="7" fill="#94a3b8">: 22</text>
    <text x="48" y="142" font-family="monospace" font-size="7" fill="#f59e0b">models</text>
    <text x="92" y="142" font-family="monospace" font-size="7" fill="#94a3b8">: 4</text>
    <text x="48" y="154" font-family="monospace" font-size="7" fill="#f59e0b">runs</text>
    <text x="80" y="154" font-family="monospace" font-size="7" fill="#94a3b8">: 3,480</text>
