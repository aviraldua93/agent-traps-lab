name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run all tests
        run: bun test

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check with tsc
        run: bunx tsc --noEmit

  dry-run:
    name: Dry Run — Matrix Validation
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Register all scenarios and generate matrix
        run: |
          output=$(bun run scripts/run-full-matrix.ts --dry-run 2>&1)
          echo "$output"

          # Verify scenario count is at least 22
          scenario_line=$(echo "$output" | grep -i "Scenarios:" | head -1)
          scenario_count=$(echo "$scenario_line" | grep -oP '\d+')
          echo "Detected $scenario_count scenarios"
          if [ -n "$scenario_count" ] && [ "$scenario_count" -ge 22 ]; then
            echo "✅ Scenario count OK ($scenario_count >= 22)"
          else
            echo "⚠️  Scenario count could not be verified (got: $scenario_count)"
          fi

          # Verify total cell count
          total_line=$(echo "$output" | grep -i "TOTAL:" | head -1)
          total_count=$(echo "$total_line" | grep -oP '\d+')
          echo "Detected $total_count total experiment cells"
          if [ -n "$total_count" ] && [ "$total_count" -ge 1 ]; then
            echo "✅ Matrix generation OK ($total_count cells)"
          else
            echo "❌ Matrix generation failed — no cells produced"
            exit 1
          fi

          # Verify dry-run completed successfully
          if echo "$output" | grep -qi "DRY RUN"; then
            echo "✅ Dry-run completed successfully"
          else
            echo "❌ Dry-run marker not found"
            exit 1
          fi
